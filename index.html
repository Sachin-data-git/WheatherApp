<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="weather-app">
            <div class="card">
                <div class="card-body">
                    <!-- Header -->
                    <div class="text-center mb-4">
                        <h1 class="app-title">
                            <i class="bi bi-cloud-sun"></i>
                            Weather App
                        </h1>
                        <p class="text-muted">Get real-time weather information for any city</p>
                    </div>

                    <!-- Search Form -->
                    <div class="search-container">
                        <div class="input-group">
                            <input 
                                type="text" 
                                class="form-control form-control-lg" 
                                id="cityInput" 
                                placeholder="Enter city name..."
                                autocomplete="off"
                            >
                            <button class="btn btn-primary btn-lg" type="button" id="searchBtn">
                                <i class="bi bi-search"></i>
                                Search
                            </button>
                        </div>
                    </div>

                    <!-- Loading Spinner -->
                    <div class="text-center mt-4" id="loadingSpinner" style="display: none;">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2 text-muted">Fetching weather data...</p>
                    </div>

                    <!-- Error Message -->
                    <div class="alert alert-danger mt-4" id="errorMessage" style="display: none;">
                        <i class="bi bi-exclamation-triangle"></i>
                        <span id="errorText"></span>
                    </div>

                    <!-- Weather Display -->
                    <div class="weather-display" id="weatherDisplay" style="display: none;">
                        <div class="weather-header">
                            <h2 class="city-name" id="cityName">--</h2>
                            <div class="weather-icon-container">
                                <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                            </div>
                        </div>

                        <div class="weather-main">
                            <div class="temperature">
                                <span class="temp-value" id="temperature">--</span>
                                <span class="temp-unit">°C</span>
                            </div>
                            <div class="weather-description" id="weatherDescription">--</div>
                        </div>

                        <div class="weather-details">
                            <div class="detail-item">
                                <i class="bi bi-droplet"></i>
                                <span class="detail-label">Humidity</span>
                                <span class="detail-value" id="humidity">--%</span>
                            </div>
                            <div class="detail-item">
                                <i class="bi bi-wind"></i>
                                <span class="detail-label">Wind Speed</span>
                                <span class="detail-value" id="windSpeed">-- m/s</span>
                            </div>
                            <div class="detail-item">
                                <i class="bi bi-thermometer-half"></i>
                                <span class="detail-label">Feels Like</span>
                                <span class="detail-value" id="feelsLike">--°C</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
